{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 id="intersectionName">路口详情</h2>
    <div>
        <a href="/" class="btn btn-secondary">返回列表</a>
    </div>
</div>

<ul class="nav nav-tabs" id="myTab" role="tablist">
    <li class="nav-item" role="presentation">
        <button class="nav-link active" id="traffic-tab" data-bs-toggle="tab" data-bs-target="#traffic" type="button">信号灯设备</button>
    </li>
    <li class="nav-item">
        <button class="nav-link" id="ep-tab" data-bs-toggle="tab" data-bs-target="#ep" type="button">电子警察</button>
    </li>
    <li class="nav-item">
        <button class="nav-link" id="attachment-tab" data-bs-toggle="tab" data-bs-target="#attachment" type="button">附件管理</button>
    </li>
</ul>

<div class="tab-content mt-3">
    <div class="tab-pane fade show active" id="traffic">
        <div class="table-responsive">
            <table class="table table-sm table-bordered" id="trafficTable">
                <thead class="table-light">
                    <tr>
                        <th>项目</th>
                        <th>信号机类型</th>
                        <th>信号机数量</th>
                        <th>左箭头</th>
                        <th>直行</th>
                        <th>右箭头</th>
                        <th>全屏</th>
                        <th>非机动车</th>
                        <th>行人灯</th>
                        <th>雷达</th>
                        <th>诱导屏</th>
                        <th>取电说明</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="trafficTableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="tab-pane fade" id="ep">
        <div class="table-responsive">
            <table class="table table-sm table-bordered" id="epTable">
                <thead class="table-light">
                    <tr>
                        <th>项目</th>
                        <th>抓拍类型</th>
                        <th>终端服务器</th>
                        <th>正向抓拍</th>
                        <th>反向抓拍</th>
                        <th>LED灯</th>
                        <th>爆闪灯</th>
                        <th>云台</th>
                        <th>信号检测器</th>
                        <th>取网说明</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="epTableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="tab-pane fade" id="attachment">
        <div class="card mt-3">
            <div class="card-header">
                <h5 class="mb-0">上传附件</h5>
            </div>
            <div class="card-body">
                <form id="uploadForm" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label">选择文件</label>
                        <input type="file" class="form-control" id="fileInput" name="file" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">文件描述</label>
                        <input type="text" class="form-control" id="fileDescription" name="description" placeholder="请输入文件描述">
                    </div>
                    <button type="submit" class="btn btn-primary">上传</button>
                </form>
            </div>
        </div>

        <div class="card mt-3">
            <div class="card-header">
                <h5 class="mb-0">已上传的附件</h5>
            </div>
            <div class="card-body">
                <table class="table table-sm table-bordered" id="attachmentTable">
                    <thead class="table-light">
                        <tr>
                            <th>文件名</th>
                            <th>描述</th>
                            <th>大小</th>
                            <th>上传者</th>
                            <th>上传时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="attachmentTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="editTrafficModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">编辑信号灯设备</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="editTrafficForm">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveTrafficLight()">保存</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="editEPModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">编辑电子警察设备</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="editEPForm">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveElectronicPolice()">保存</button>
            </div>
        </div>
    </div>
</div>

<script>
const intersectionId = {{ intersection_id }};
let currentEditId = null;
let currentEditType = null;

$(document).ready(function() {
    loadIntersectionDetail();

    $('#uploadForm').on('submit', function(e) {
        e.preventDefault();
        uploadFile();
    });
});

function loadIntersectionDetail() {
    $.get(`/api/intersection/${intersectionId}`, function(data) {
        $('#intersectionName').text(data.intersection.name);

        let tlRows = '';
        data.traffic_lights.forEach(tl => {
            tlRows += `<tr>
                <td>${tl.project_name} (${tl.warranty_expire_date})</td>
                <td>${tl.signal_type || '-'}</td>
                <td>${tl.signal_count}</td>
                <td>${tl.left_arrow_count}</td>
                <td>${tl.straight_arrow_count}</td>
                <td>${tl.right_arrow_count}</td>
                <td>${tl.full_screen_count}</td>
                <td>${tl.non_motor_count}</td>
                <td>${tl.pedestrian_count}</td>
                <td>${tl.radar_count}</td>
                <td>${tl.guide_screen_count}</td>
                <td>${tl.power_source || '-'}</td>
                <td><button class="btn btn-sm btn-warning" onclick="editTrafficLight(${tl.id})">编辑</button></td>
            </tr>`;
        });
        $('#trafficTableBody').html(tlRows || '<tr><td colspan="13" class="text-center">暂无数据</td></tr>');

        let epRows = '';
        data.electronic_polices.forEach(ep => {
            epRows += `<tr>
                <td>${ep.project_name} (${ep.warranty_expire_date})</td>
                <td>${ep.capture_type || '-'}</td>
                <td>${ep.terminal_server_count}</td>
                <td>${ep.forward_capture_count}</td>
                <td>${ep.reverse_capture_count}</td>
                <td>${ep.led_light_count}</td>
                <td>${ep.strobe_light_count}</td>
                <td>${ep.ptz_count}</td>
                <td>${ep.signal_detector_count}</td>
                <td>${ep.network_source || '-'}</td>
                <td><button class="btn btn-sm btn-warning" onclick="editElectronicPolice(${ep.id})">编辑</button></td>
            </tr>`;
        });
        $('#epTableBody').html(epRows || '<tr><td colspan="11" class="text-center">暂无数据</td></tr>');

        loadAttachments(data.attachments || []);
    });
}

function loadAttachments(attachments) {
    let rows = '';
    attachments.forEach(att => {
        rows += `<tr>
            <td>${att.file_name}</td>
            <td>${att.description || '-'}</td>
            <td>${formatFileSize(att.file_size)}</td>
            <td>${att.uploaded_by || '-'}</td>
            <td>${att.upload_time || '-'}</td>
            <td>
                <a href="/download/${att.id}" class="btn btn-sm btn-info">下载</a>
                <button class="btn btn-sm btn-danger" onclick="deleteAttachment(${att.id})">删除</button>
            </td>
        </tr>`;
    });
    $('#attachmentTableBody').html(rows || '<tr><td colspan="6" class="text-center">暂无附件</td></tr>');
}

function formatFileSize(bytes) {
    if (!bytes) return '0 B';
    const k = 1024;
    const sizes = ['B', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
}

function uploadFile() {
    const fileInput = $('#fileInput')[0];
    if (!fileInput.files[0]) {
        alert('请选择文件');
        return;
    }

    const formData = new FormData();
    formData.append('file', fileInput.files[0]);
    formData.append('entity_type', 'intersection');
    formData.append('entity_id', intersectionId);
    formData.append('description', $('#fileDescription').val());

    $.ajax({
        url: '/api/upload',
        method: 'POST',
        data: formData,
        processData: false,
        contentType: false,
        success: function(res) {
            if (res.status === 'success') {
                alert('上传成功！');
                $('#fileInput').val('');
                $('#fileDescription').val('');
                loadIntersectionDetail();
            } else {
                alert('上传失败：' + (res.message || '未知错误'));
            }
        },
        error: function() {
            alert('上传失败');
        }
    });
}

function deleteAttachment(attachmentId) {
    if (!confirm('确定要删除这个附件吗？')) return;

    $.ajax({
        url: `/api/attachment/${attachmentId}/delete`,
        method: 'DELETE',
        success: function(res) {
            if (res.status === 'success') {
                alert('删除成功！');
                loadIntersectionDetail();
            } else {
                alert('删除失败：' + (res.message || '未知错误'));
            }
        },
        error: function() {
            alert('删除失败');
        }
    });
}

function editTrafficLight(id) {
    currentEditId = id;
    currentEditType = 'traffic';

    $.get(`/api/intersection/${intersectionId}`, function(data) {
        const tl = data.traffic_lights.find(t => t.id === id);
        if (!tl) return;

        $('#editTrafficForm').html(`
            <div class="mb-3">
                <label class="form-label">信号机类型</label>
                <input type="text" class="form-control" id="tl_signal_type" value="${tl.signal_type || ''}">
            </div>
            <div class="row">
                <div class="col mb-3">
                    <label class="form-label">信号机数量</label>
                    <input type="number" class="form-control" id="tl_signal_count" value="${tl.signal_count}">
                </div>
                <div class="col mb-3">
                    <label class="form-label">左箭头</label>
                    <input type="number" class="form-control" id="tl_left_arrow_count" value="${tl.left_arrow_count}">
                </div>
            </div>
            <div class="row">
                <div class="col mb-3">
                    <label class="form-label">直行</label>
                    <input type="number" class="form-control" id="tl_straight_arrow_count" value="${tl.straight_arrow_count}">
                </div>
                <div class="col mb-3">
                    <label class="form-label">右箭头</label>
                    <input type="number" class="form-control" id="tl_right_arrow_count" value="${tl.right_arrow_count}">
                </div>
            </div>
            <div class="row">
                <div class="col mb-3">
                    <label class="form-label">全屏</label>
                    <input type="number" class="form-control" id="tl_full_screen_count" value="${tl.full_screen_count}">
                </div>
                <div class="col mb-3">
                    <label class="form-label">非机动车</label>
                    <input type="number" class="form-control" id="tl_non_motor_count" value="${tl.non_motor_count}">
                </div>
            </div>
            <div class="row">
                <div class="col mb-3">
                    <label class="form-label">行人灯</label>
                    <input type="number" class="form-control" id="tl_pedestrian_count" value="${tl.pedestrian_count}">
                </div>
                <div class="col mb-3">
                    <label class="form-label">雷达</label>
                    <input type="number" class="form-control" id="tl_radar_count" value="${tl.radar_count}">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">诱导屏</label>
                <input type="number" class="form-control" id="tl_guide_screen_count" value="${tl.guide_screen_count}">
            </div>
            <div class="mb-3">
                <label class="form-label">取电说明</label>
                <textarea class="form-control" id="tl_power_source">${tl.power_source || ''}</textarea>
            </div>
        `);

        new bootstrap.Modal(document.getElementById('editTrafficModal')).show();
    });
}

function saveTrafficLight() {
    const data = {
        signal_type: $('#tl_signal_type').val(),
        signal_count: parseInt($('#tl_signal_count').val()) || 0,
        left_arrow_count: parseInt($('#tl_left_arrow_count').val()) || 0,
        straight_arrow_count: parseInt($('#tl_straight_arrow_count').val()) || 0,
        right_arrow_count: parseInt($('#tl_right_arrow_count').val()) || 0,
        full_screen_count: parseInt($('#tl_full_screen_count').val()) || 0,
        non_motor_count: parseInt($('#tl_non_motor_count').val()) || 0,
        pedestrian_count: parseInt($('#tl_pedestrian_count').val()) || 0,
        radar_count: parseInt($('#tl_radar_count').val()) || 0,
        guide_screen_count: parseInt($('#tl_guide_screen_count').val()) || 0,
        power_source: $('#tl_power_source').val()
    };

    $.ajax({
        url: `/api/traffic_light/${currentEditId}`,
        method: 'PUT',
        contentType: 'application/json',
        data: JSON.stringify(data),
        success: function(res) {
            if (res.status === 'success') {
                alert('保存成功！');
                bootstrap.Modal.getInstance(document.getElementById('editTrafficModal')).hide();
                loadIntersectionDetail();
            } else {
                alert('保存失败：' + (res.message || '未知错误'));
            }
        },
        error: function() {
            alert('请求失败');
        }
    });
}

function editElectronicPolice(id) {
    currentEditId = id;
    currentEditType = 'ep';

    $.get(`/api/intersection/${intersectionId}`, function(data) {
        const ep = data.electronic_polices.find(e => e.id === id);
        if (!ep) return;

        $('#editEPForm').html(`
            <div class="mb-3">
                <label class="form-label">抓拍类型</label>
                <input type="text" class="form-control" id="ep_capture_type" value="${ep.capture_type || ''}">
            </div>
            <div class="row">
                <div class="col mb-3">
                    <label class="form-label">终端服务器</label>
                    <input type="number" class="form-control" id="ep_terminal_server_count" value="${ep.terminal_server_count}">
                </div>
                <div class="col mb-3">
                    <label class="form-label">正向抓拍</label>
                    <input type="number" class="form-control" id="ep_forward_capture_count" value="${ep.forward_capture_count}">
                </div>
            </div>
            <div class="row">
                <div class="col mb-3">
                    <label class="form-label">反向抓拍</label>
                    <input type="number" class="form-control" id="ep_reverse_capture_count" value="${ep.reverse_capture_count}">
                </div>
                <div class="col mb-3">
                    <label class="form-label">LED灯</label>
                    <input type="number" class="form-control" id="ep_led_light_count" value="${ep.led_light_count}">
                </div>
            </div>
            <div class="row">
                <div class="col mb-3">
                    <label class="form-label">爆闪灯</label>
                    <input type="number" class="form-control" id="ep_strobe_light_count" value="${ep.strobe_light_count}">
                </div>
                <div class="col mb-3">
                    <label class="form-label">云台</label>
                    <input type="number" class="form-control" id="ep_ptz_count" value="${ep.ptz_count}">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">信号检测器</label>
                <input type="number" class="form-control" id="ep_signal_detector_count" value="${ep.signal_detector_count}">
            </div>
            <div class="mb-3">
                <label class="form-label">取网说明</label>
                <textarea class="form-control" id="ep_network_source">${ep.network_source || ''}</textarea>
            </div>
        `);

        new bootstrap.Modal(document.getElementById('editEPModal')).show();
    });
}

function saveElectronicPolice() {
    const data = {
        capture_type: $('#ep_capture_type').val(),
        terminal_server_count: parseInt($('#ep_terminal_server_count').val()) || 0,
        forward_capture_count: parseInt($('#ep_forward_capture_count').val()) || 0,
        reverse_capture_count: parseInt($('#ep_reverse_capture_count').val()) || 0,
        led_light_count: parseInt($('#ep_led_light_count').val()) || 0,
        strobe_light_count: parseInt($('#ep_strobe_light_count').val()) || 0,
        ptz_count: parseInt($('#ep_ptz_count').val()) || 0,
        signal_detector_count: parseInt($('#ep_signal_detector_count').val()) || 0,
        network_source: $('#ep_network_source').val()
    };

    $.ajax({
        url: `/api/electronic_police/${currentEditId}`,
        method: 'PUT',
        contentType: 'application/json',
        data: JSON.stringify(data),
        success: function(res) {
            if (res.status === 'success') {
                alert('保存成功！');
                bootstrap.Modal.getInstance(document.getElementById('editEPModal')).hide();
                loadIntersectionDetail();
            } else {
                alert('保存失败：' + (res.message || '未知错误'));
            }
        },
        error: function() {
            alert('请求失败');
        }
    });
}
</script>
{% endblock %}
