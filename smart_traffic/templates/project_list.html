{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>所有项目</h2>
    <button class="btn btn-success" onclick="exportProjects()">导出Excel</button>
</div>
<div class="table-responsive">
    <table class="table table-bordered table-hover" id="projectTable">
        <thead class="table-light">
            <tr>
                <th>ID</th>
                <th>项目名称</th>
                <th>合同金额</th>
                <th>验收日期</th>
                <th>质保期</th>
                <th>质保到期</th>
                <th>建设单位</th>
                <th>施工单位</th>
            </tr>
        </thead>
        <tbody id="projectTableBody">
        </tbody>
    </table>
</div>

<script>
$(document).ready(function() {
    loadProjects();
});

function loadProjects() {
    $.get('/api/projects', function(data) {
        let rows = '';
        data.forEach(p => {
            rows += `<tr>
                <td>${p.id}</td>
                <td>${p.name}</td>
                <td>${p.contract_amount ? '¥' + parseFloat(p.contract_amount).toLocaleString() : '-'}</td>
                <td>${p.acceptance_date || '-'}</td>
                <td>${p.warranty_period || '-'}</td>
                <td>${p.warranty_expire_date}</td>
                <td>${p.builder || '-'}</td>
                <td>${p.constructor || '-'}</td>
            </tr>`;
        });
        $('#projectTableBody').html(rows || '<tr><td colspan="8" class="text-center">暂无数据</td></tr>');
    });
}

function exportProjects() {
    window.location.href = '/api/export/projects';
}
</script>
{% endblock %}
