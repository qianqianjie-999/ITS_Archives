<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能交通档案系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .warranty-active { color: green; font-weight: bold; }
        .warranty-expired { color: red; }
        .warranty-none { color: gray; }
        .navbar-brand { font-weight: bold; }
        .container { margin-top: 20px; }
        .user-info { color: #fff; margin-right: 15px; }
        .role-badge { font-size: 0.75rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">智能交通档案系统</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">路口管理</a></li>
                    <li class="nav-item"><a class="nav-link" href="/points">点位管理</a></li>
                    <li class="nav-item"><a class="nav-link" href="/projects">项目管理</a></li>
                    <li class="nav-item" id="logsNavItem" style="display: none;">
                        <a class="nav-link" href="/logs">操作日志</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-3">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                            <span id="userDisplayName">未登录</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><span class="dropdown-item-text">
                                <strong id="userName"></strong>
                                <br><small id="userRole" class="text-muted"></small>
                            </span></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#" id="logoutBtn">退出登录</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <script>
    $(document).ready(function() {
        checkLoginStatus();

        $('#logoutBtn').on('click', function() {
            $.ajax({
                url: '/api/logout',
                method: 'POST',
                success: function() {
                    window.location.href = '/login';
                }
            });
        });
    });

    function checkLoginStatus() {
        $.get('/api/current_user', function(res) {
            if (res.status === 'success') {
                $('#userDisplayName').text(res.user.display_name || res.user.username);
                $('#userName').text(res.user.display_name || res.user.username);
                $('#userRole').text(getRoleName(res.user.role));

                if (res.user.role === 'admin') {
                    $('#logsNavItem').show();
                }
            } else {
                window.location.href = '/login';
            }
        }).fail(function() {
            window.location.href = '/login';
        });
    }

    function getRoleName(role) {
        const roleNames = {
            'admin': '管理员',
            'editor': '编辑',
            'viewer': '查看'
        };
        return roleNames[role] || role;
    }
    </script>
</body>
</html>
